services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env

  # celery:
  #   build: ./backend
  #   command: celery -A app.celery_worker worker --loglevel=info
  celery:
    build: ./backend
    command: celery -A app.celery_worker.celery worker --loglevel=info
    depends_on:
      - redis
    env_file:
      - .env
  redis:
    image: redis
    ports:
      - "6379:6379"   # ✅ MUST BE PRESENT
  db:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: 12345
    ports:
      - "5433:5432"
  
  frontend:
    build: ./frontend-ui
    ports:
      - "3000:80"
    depends_on:
      - backend
